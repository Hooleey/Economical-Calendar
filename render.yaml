services:
  - type: web
    name: economic-calendarr-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --lifespan off
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FRONTEND_ORIGIN_REGEX
        # Example: ^https://hooleey\.github\.io$
        sync: false
